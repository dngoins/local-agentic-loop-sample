name: Mini SWE Agent Dev Branch Loop

on:
  issues:
    types:
      - labeled
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to run mini-SWE-agent against"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: mini-swe-agent-dev-branch
  cancel-in-progress: false

jobs:
  run-agent:
    name: Run mini-SWE-agent and push to dev branch
    runs-on:
      - self-hosted
      - mini-swe-agent

    if: >
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'agent:ready' &&
        !contains(github.event.issue.labels.*.name, 'agent:blocked')
      ) ||
      (
        github.event_name == 'issue_comment' &&
        startsWith(github.event.comment.body, '/agent run') &&
        !github.event.issue.pull_request &&
        !contains(github.event.issue.labels.*.name, 'agent:blocked')
      ) ||
      github.event_name == 'workflow_dispatch'

    env:
      GH_TOKEN: ${{ github.token }}
      DEV_BRANCH: agent-dev
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      MSWEA_COST_TRACKING: ignore_errors

    steps:
      - name: Resolve issue number
        id: issue
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify trusted trigger actor
        shell: bash
        run: |
          actor="${{ github.actor }}"
          permission="$(gh api repos/${{ github.repository }}/collaborators/$actor/permission --jq '.permission' || echo none)"

          case "$permission" in
            admin|maintain|write)
              echo "Actor $actor has $permission permission."
              ;;
            *)
              echo "Actor $actor does not have write/maintain/admin permission."
              exit 1
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEV_BRANCH }}
          token: ${{ github.token }}

      - name: Prepare dev branch
        shell: bash
        run: |
          git config user.name "mini-swe-agent-bot"
          git config user.email "mini-swe-agent-bot@users.noreply.github.com"

          git fetch origin "$DEV_BRANCH"
          git checkout "$DEV_BRANCH"
          git reset --hard "origin/$DEV_BRANCH"

      - name: Mark issue as running
        shell: bash
        run: |
          issue="${{ steps.issue.outputs.number }}"

          gh issue edit "$issue" \
            --remove-label "agent:ready" \
            --add-label "agent:running" || true

          gh issue comment "$issue" \
            --body "mini-SWE-agent started. Changes will be pushed directly to branch \`$DEV_BRANCH\`."

      - name: Confirm Ollama is reachable
        shell: bash
        run: |
          curl -sf http://ollama:11434/api/tags
          echo "Ollama is reachable."

      - name: Build task prompt from issue
        shell: bash
        run: |
          issue="${{ steps.issue.outputs.number }}"

          gh issue view "$issue" \
            --json title,body,url,labels,comments \
            --jq '
              "# GitHub Issue\n\n" +
              "URL: " + .url + "\n\n" +
              "Title: " + .title + "\n\n" +
              "Body:\n" + (.body // "") + "\n\n" +
              "Labels:\n" + ([.labels[].name] | join(", ")) + "\n\n" +
              "Recent comments:\n" + ([.comments[-5:][]?.body] | join("\n\n---\n\n"))
            ' > /tmp/issue-context.md

          cat > /tmp/agent-task.md <<'TASK_PROMPT'
          You are running inside GitHub Actions on a repository checkout.

          Objective:
          - Read the GitHub issue context below.
          - Modify this repository to satisfy the acceptance criteria.
          - Push-ready code should target the dev branch only.
          - Make the smallest safe change.
          - Add or update tests when behavior changes.
          - Prefer existing project patterns.
          - Do not modify CI, deployment, secrets, authentication, or infrastructure files unless the issue explicitly requires it.
          - Do not change the default branch.
          - Do not delete unrelated files.
          - Run relevant tests or validation if available.
          - Stop when the task is complete.

          Git branch policy:
          - Work only on the current branch.
          - The current branch is the dev branch used by the agent.
          - Never switch to main.
          - Never push to main.

          TASK_PROMPT

          cat /tmp/issue-context.md >> /tmp/agent-task.md

          echo "===== Agent Task ====="
          cat /tmp/agent-task.md

      - name: Run mini-SWE-agent
        shell: bash
        run: |
          mini \
            -c /opt/agent-config/mini-local-ollama.yaml \
            -y \
            --exit-immediately \
            -o /tmp/mini-swe-agent-run.traj.json \
            -t "$(cat /tmp/agent-task.md)"

      - name: Run lightweight validation
        id: validation
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail

          if [ -f package.json ]; then
            if command -v npm >/dev/null 2>&1; then
              npm test 2>&1 | tee /tmp/validation.log
            else
              echo "npm not installed." | tee /tmp/validation.log
              exit 1
            fi
          elif [ -f pyproject.toml ] || [ -d tests ]; then
            python3 -m pip install -e . 2>&1 | tee /tmp/validation.log || true
            python3 -m pytest 2>&1 | tee -a /tmp/validation.log
          else
            echo "No standard validation command detected." | tee /tmp/validation.log
          fi

      - name: Commit changes
        id: commit
        shell: bash
        run: |
          issue="${{ steps.issue.outputs.number }}"

          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes produced by mini-SWE-agent."
            exit 0
          fi

          echo "Changed files:"
          git status --short

          git add .
          git commit -m "Agent update for issue #$issue"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push to dev branch only
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          git pull --rebase origin "$DEV_BRANCH"
          git push origin "HEAD:$DEV_BRANCH"

      - name: Mark issue done
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          issue="${{ steps.issue.outputs.number }}"
          commit_sha="$(git rev-parse --short HEAD)"

          gh issue edit "$issue" \
            --remove-label "agent:running" \
            --add-label "agent:done" || true

          gh issue comment "$issue" \
            --body "mini-SWE-agent pushed commit \`$commit_sha\` directly to \`$DEV_BRANCH\`. Validation result: \`${{ steps.validation.outcome }}\`."

      - name: Mark issue failed when no changes
        if: steps.commit.outputs.changed == 'false'
        shell: bash
        run: |
          issue="${{ steps.issue.outputs.number }}"

          gh issue edit "$issue" \
            --remove-label "agent:running" \
            --add-label "agent:failed" || true

          gh issue comment "$issue" \
            --body "mini-SWE-agent completed but produced no file changes."
